<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" role="img" aria-label="The Resonance Loop — directed dataflow graph">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#7b8a9e"/>
    </marker>
    <marker id="arrowFlow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5ad1c4"/>
    </marker>
    <marker id="arrowBuild" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4f9bff"/>
    </marker>
    <marker id="arrowGold" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c9a227"/>
    </marker>
  </defs>

  <!-- self-contained background (renders the same on GitHub light or dark) -->
  <rect x="1" y="1" width="918" height="538" rx="14" fill="#0e1117" stroke="#3a4456"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">

    <!-- bands -->
    <rect x="100" y="150" width="200" height="120" rx="10" fill="#b07cff" fill-opacity="0.06" stroke="#b07cff" stroke-dasharray="4 4"/>
    <text x="112" y="168" font-size="10.5" font-weight="500" fill="#b07cff">DISCOVERY — kept loose</text>

    <rect x="498" y="120" width="262" height="212" rx="10" fill="#4f9bff" fill-opacity="0.06" stroke="#4f9bff" stroke-dasharray="4 4"/>
    <text x="510" y="138" font-size="10.5" font-weight="500" fill="#4f9bff">BUILD &#8596; VERIFY LOOP</text>

    <!-- Overseer -->
    <rect x="40" y="30" width="180" height="60" rx="10" fill="#1d2330" stroke="#c9a227" stroke-width="1.5"/>
    <text x="130" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Overseer</text>
    <text x="130" y="73" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">frames intent &#183; final eval</text>

    <!-- Human gate / deploy -->
    <rect x="700" y="30" width="180" height="60" rx="10" fill="#1d2330" stroke="#c9a227" stroke-width="1.5"/>
    <text x="790" y="56" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Human gate &#183; Deploy</text>
    <text x="790" y="73" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">deploy-bless</text>

    <!-- Strategist (discovery) -->
    <rect x="120" y="180" width="160" height="74" rx="10" fill="#1d1a2e" stroke="#b07cff" stroke-width="1.5"/>
    <text x="200" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Strategist</text>
    <text x="200" y="226" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">theory-craft + field/SOTA</text>
    <text x="200" y="240" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">answers to probes</text>

    <!-- Gate -->
    <rect x="335" y="186" width="140" height="64" rx="10" fill="#2a1a1d" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="405" y="212" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Gate</text>
    <text x="405" y="230" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">honors the architecture?</text>

    <!-- Builder -->
    <rect x="520" y="158" width="150" height="62" rx="10" fill="#16243a" stroke="#4f9bff" stroke-width="1.5"/>
    <text x="595" y="184" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Builder</text>
    <text x="595" y="202" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">implements from side-store</text>

    <!-- Analyzer -->
    <rect x="560" y="252" width="150" height="62" rx="10" fill="#16243a" stroke="#4f9bff" stroke-width="1.5"/>
    <text x="635" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Analyzer</text>
    <text x="635" y="296" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">verify + meaning re-check</text>

    <!-- Side-store -->
    <rect x="360" y="378" width="220" height="76" rx="10" fill="#1a2030" stroke="#3a4658" stroke-width="1.5"/>
    <text x="470" y="404" text-anchor="middle" font-size="13" font-weight="600" fill="#e8eef5">Side-store</text>
    <text x="470" y="422" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">architecture map + design docs</text>
    <text x="470" y="436" text-anchor="middle" font-size="10.5" font-weight="500" fill="#8b97a8">read just-in-time by every node</text>

    <!-- ===== EDGES ===== -->
    <!-- Overseer -> Strategist -->
    <path d="M120,90 C120,135 150,150 178,176" fill="none" stroke="#5ad1c4" stroke-width="1.6" marker-end="url(#arrowFlow)"/>
    <text x="84" y="150" font-size="10" fill="#8b97a8">desired outcome</text>

    <!-- Strategist -> Gate -->
    <path d="M280,216 L331,216" fill="none" stroke="#7b8a9e" stroke-width="1.4" marker-end="url(#arrow)"/>

    <!-- Gate -> Builder -->
    <path d="M475,206 C500,200 512,196 524,192" fill="none" stroke="#ff6b6b" stroke-width="1.4" marker-end="url(#arrowBuild)"/>
    <text x="486" y="184" font-size="10" fill="#8b97a8">pass &#8594;</text>

    <!-- Builder -> Analyzer (loop down) -->
    <path d="M600,220 C612,236 620,242 632,250" fill="none" stroke="#4f9bff" stroke-width="1.5" marker-end="url(#arrowBuild)"/>
    <text x="616" y="242" font-size="10" fill="#8b97a8">built</text>

    <!-- Analyzer -> Builder (loop back up) -->
    <path d="M585,252 C560,238 556,234 562,222" fill="none" stroke="#4f9bff" stroke-width="1.5" marker-end="url(#arrowBuild)"/>
    <text x="500" y="250" font-size="10" fill="#8b97a8">needs update &#8593;</text>

    <!-- Side-store feeds (dashed) all nodes -->
    <path d="M400,378 C320,330 250,288 218,256" fill="none" stroke="#5ad1c4" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arrowFlow)" opacity="0.8"/>
    <path d="M510,380 C545,330 565,300 588,222" fill="none" stroke="#5ad1c4" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arrowFlow)" opacity="0.8"/>
    <path d="M548,382 C585,348 610,338 636,316" fill="none" stroke="#5ad1c4" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arrowFlow)" opacity="0.8"/>
    <path d="M398,384 C368,342 384,292 408,252" fill="none" stroke="#5ad1c4" stroke-width="1.2" stroke-dasharray="3 4" marker-end="url(#arrowFlow)" opacity="0.8"/>
    <text x="296" y="350" font-size="10" fill="#5ad1c4">just-in-time reads</text>

    <!-- Analyzer -> Overseer (converged) -->
    <path d="M600,254 C645,150 320,118 152,92" fill="none" stroke="#7b8a9e" stroke-width="1.4" marker-end="url(#arrow)"/>
    <text x="424" y="112" font-size="10" fill="#8b97a8">converged &#8594; final eval</text>

    <!-- Overseer -> Human gate (deploy) -->
    <path d="M220,56 C420,40 560,40 698,56" fill="none" stroke="#c9a227" stroke-width="1.5" marker-end="url(#arrowGold)"/>
    <text x="430" y="40" font-size="10" fill="#8b97a8">deploy-bless</text>

    <!-- ===== LEGEND ===== -->
    <rect x="40"  y="494" width="11" height="11" rx="3" fill="#c9a227"/>
    <text x="58"  y="503" font-size="11" fill="#8b97a8">Overseer / human gate</text>
    <rect x="222" y="494" width="11" height="11" rx="3" fill="#b07cff"/>
    <text x="240" y="503" font-size="11" fill="#8b97a8">Discovery (kept loose)</text>
    <rect x="398" y="494" width="11" height="11" rx="3" fill="#ff6b6b"/>
    <text x="416" y="503" font-size="11" fill="#8b97a8">Gate (drift catch)</text>
    <rect x="548" y="494" width="11" height="11" rx="3" fill="#4f9bff"/>
    <text x="566" y="503" font-size="11" fill="#8b97a8">Build &#8596; verify loop</text>
    <rect x="712" y="494" width="11" height="11" rx="3" fill="#5ad1c4"/>
    <text x="730" y="503" font-size="11" fill="#8b97a8">Side-store reads</text>

  </g>
</svg>
